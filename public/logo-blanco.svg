<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- Accordion icon -->
  <!-- Body of accordion -->
  <rect x="4" y="12" width="44" height="36" rx="4" fill="#ffffff" opacity="0.95"/>
  <!-- Bellows / grille lines on left side -->
  <rect x="8" y="16" width="6" height="28" rx="2" fill="#ff6b8a"/>
  <!-- Keys area on right side -->
  <rect x="34" y="16" width="10" height="28" rx="2" fill="#ff6b8a" opacity="0.85"/>
  <!-- Bellows horizontal lines (center body) -->
  <line x1="17" y1="20" x2="31" y2="20" stroke="#ff6b8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="25" x2="31" y2="25" stroke="#ff6b8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="30" x2="31" y2="30" stroke="#ff6b8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="35" x2="31" y2="35" stroke="#ff6b8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="40" x2="31" y2="40" stroke="#ff6b8a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small keys on right panel -->
  <rect x="36" y="19" width="2" height="6" rx="1" fill="#1a1a2e" opacity="0.8"/>
  <rect x="40" y="19" width="2" height="6" rx="1" fill="#1a1a2e" opacity="0.8"/>
  <rect x="36" y="28" width="2" height="6" rx="1" fill="#1a1a2e" opacity="0.8"/>
  <rect x="40" y="28" width="2" height="6" rx="1" fill="#1a1a2e" opacity="0.8"/>
  <rect x="36" y="37" width="2" height="5" rx="1" fill="#1a1a2e" opacity="0.8"/>
  <rect x="40" y="37" width="2" height="5" rx="1" fill="#1a1a2e" opacity="0.8"/>

  <!-- Text: VentaDeAcordeones -->
  <text x="56" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="-0.3">VentaDeAcordeones</text>
  <!-- Text: .com -->
  <text x="240" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ff6b8a">.com</text>
</svg>
