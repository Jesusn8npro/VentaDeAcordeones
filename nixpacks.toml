# EasyPanel / Nixpacks — Next.js 16 (requiere Node >=20.9)
[variables]
NODE_ENV = "production"
PORT = "3000"

# IMPORTANTE: las NEXT_PUBLIC_* se incrustan en el bundle del navegador en el
# BUILD. EasyPanel solo inyecta sus envs en runtime, no en build → por eso
# quedaban como placeholder. Aquí se garantizan en build. Son valores PÚBLICOS
# (la anon key está protegida por RLS; URL y public key de ePayco son públicas;
# se envían al navegador igualmente). NO pongas aquí secretos (service_role,
# EPAYCO_PRIVATE_KEY): esos van solo como env de EasyPanel (se leen en runtime).
NEXT_PUBLIC_SUPABASE_URL = "https://dxcpzivxzxvhabdimemb.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4Y3B6aXZ4enh2aGFiZGltZW1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY4NDgyMDcsImV4cCI6MjA4MjQyNDIwN30.tevoIAGE363woAt_DnK7R9hhZ-yrn-d8UTFzJfrP0Hc"
NEXT_PUBLIC_EPAYCO_PUBLIC_KEY = "a04d60e2e678d5bd89a58d26f3413fdb"
NEXT_PUBLIC_EPAYCO_TEST_MODE = "false"
NEXT_PUBLIC_EPAYCO_ENVIRONMENT = "production"
NEXT_PUBLIC_EPAYCO_URL_RESPONSE = "https://ventadeacordeones.com/respuesta-epayco"
NEXT_PUBLIC_EPAYCO_URL_CONFIRMATION = "https://ventadeacordeones.com/confirmacion-epayco"

# nixpkgsArchive fija una revisión con nodejs_22 (evita "undefined variable 'nodejs_22'").
# vips/pkg-config: necesarios si se reactiva la optimización de imágenes de Next.
[phases.setup]
nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"
nixPkgs = ["nodejs_22", "python3", "pkg-config", "vips"]

# NODE_ENV=production hace que npm omita devDependencies; --include=dev las fuerza
# (Next se necesita para build).
[phases.install]
cmds = ["npm install --include=dev --no-audit --no-fund"]

[phases.build]
cmd = "npm run build"

[start]
cmd = "npm run start"
